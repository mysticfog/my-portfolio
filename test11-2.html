<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <h1 class="mt-6 text-3xl font-bold text-center mb-8">
      Travel Photo Gallery
    </h1>
    <p class="text-center text-gray-600 mb-6 font-aria">
      여행은 다른 풍경을 보는 것이 아니라, 새로운 눈을 갖게 되는 과정이다.<br />
      멈춤이 있어야 비로소 보이는 것들, 여행은 삶의 쉼표이자 다시 시작할
      느낌표이다.
    </p>
    <div class="grid gap-4">
      <!-- 큰 이미지 -->
      <div class="main-display">
        <img
          id="topImage"
          class="w-full h-auto max-w-full object-cover object-center md:h-[480px]"
          src="images/11/jpdvg-travel-6470467_1920.jpg"
          alt="여행을 시작하는 것은 어떤 일인가?"
        />
      </div>
      <!-- 작은 이미지 -->
      <div class="thumbnail-list grid grid-cols-5 gap-3">
        <img
          class="thumb w-full h-40 rounded-lg object-cover object-center cursor-pointer opacity-60 hover:opacity-100 hover:scale-105 transition-[opacity,transform]"
          src="images/11/chiemseherin-wadi-rum-5079834_1920.jpg"
          alt=""
        />
        <img
          class="thumb w-full h-40 rounded-lg object-cover object-center cursor-pointer opacity-60 hover:opacity-100 hover:scale-105 transition-[opacity,transform]"
          src="images/11/darkmoon_art-fantasy-3502188_1920.jpg"
          alt=""
        />
        <img
          class="thumb w-full h-40 rounded-lg object-cover object-center cursor-pointer opacity-60 hover:opacity-100 hover:scale-105 transition-[opacity,transform]"
          src="images/11/giuseppedio-beach-4405371_1920.jpg"
          alt=""
        />
        <img
          class="thumb w-full h-40 rounded-lg object-cover object-center cursor-pointer opacity-60 hover:opacity-100 hover:scale-105 transition-[opacity,transform]"
          src="images/11/joshuaworoniecki-merry-christmas-5219496_1920.jpg"
          alt=""
        />
        <img
          class="thumb w-full h-40 rounded-lg object-cover object-center cursor-pointer opacity-60 hover:opacity-100 hover:scale-105 transition-[opacity,transform]"
          src="images/11/veverkolog-ship-8308680_1920.jpg"
          alt=""
        />
      </div>
      <!-- 스크립트 -->
      <script>
        // 상위 큰 이미지 요소 선택
        const topImage = document.getElementById("topImage");

        // 하위 이미지들이 담긴 부모 요소 선택
        const thumbList = document.querySelector(".thumbnail-list");

        // 클릭 이벤트 리스너 추가 (이벤트 위임 활용)
        thumbList.addEventListener("click", function (event) {
          // 클릭된 요소가 'thumb' 클래스를 가진 이미지인지 확인
          if (event.target.classList.contains("thumb")) {
            // 클릭한 하위 이미지의 src를 상위 이미지의 src로 변경
            topImage.src = event.target.src;
          }
        });
      </script>
    </div>
  </body>
</html>
